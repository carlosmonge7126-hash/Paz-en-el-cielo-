<!DOCTYPE html>
<html>

<head>
    <title>Paz en el cielo</title>
    <style>
        /* Estilos base */
        body {
            background-image: url('image_ceef5755.png');
            background-size: cover; background-position: center;
            background-attachment: fixed; margin: 0; height: 100vh; overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        h1 { color: rgb(255, 102, 0); position: relative; left: 20%; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }
        h2 { color: green; left: 15%; position: absolute; font-style: italic; }

        /* --- 1. Animación de Pulso para el botón --- */
        @keyframes pulso {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255, 102, 0, 0.7); }
            70% { transform: scale(1.05); box-shadow: 0 0 0 10px rgba(255, 102, 0, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255, 102, 0, 0); }
        }

        .mi-boton {
            position: absolute; top: 50%; left: 40%;
            padding: 15px 30px; background-color: rgb(255, 102, 0);
            color: white; border: none; border-radius: 50px; /* Más redondeado */
            cursor: pointer; z-index: 10; font-size: 18px; font-weight: bold;
            animation: pulso 2s infinite; /* Aplicamos la animación */
            transition: background-color 0.3s;
        }

        .mi-boton:hover { background-color: darkorange; animation: none; transform: scale(1.1); }

        /* --- Estilos del Modal --- */
        .modal {
            display: none; position: fixed; z-index: 100;
            left: 0; top: 0; width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(5px); /* Efecto de desenfoque al fondo */
        }

        .modal-contenido {
            background-color: peachpuff; margin: 12% auto;
            padding: 40px; border-radius: 20px; width: 50%;
            text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .cerrar { color: #555; float: right; font-size: 32px; font-weight: bold; cursor: pointer; margin-top: -20px; }
        
        #frase-paz { font-style: italic; color: #5d4037; margin: 20px 0; font-size: 1.4em; min-height: 60px; }

        .enlace-youtube {
            display: inline-block; margin-top: 25px; padding: 12px 25px;
            background-color: #FF0000; color: white; text-decoration: none;
            border-radius: 8px; font-weight: bold; transition: 0.3s;
        }

        .enlace-youtube:hover { background-color: #cc0000; transform: translateY(-3px); }
    </style>
</head>

<body>

    <h1>Paz en el cielo</h1>
    <section><div><h2>“Domina tu mente“</h2></div></section>

    <button id="btnAbrir" class="mi-boton">Haz clic para tu momento de paz</button>

    <div id="miModal" class="modal">
        <div class="modal-contenido">
            <span class="cerrar" id="btnCerrar">&times;</span>
            <p style="font-weight: bold; color: rgb(255, 102, 0);">RESPIRA PROFUNDO</p>
            
            <div id="frase-paz">Cargando tu mensaje de paz...</div>
            
            <p style="font-size: 1em; color: #666;">Acompaña este momento con música:</p>
            
            <a href="https://www.youtube.com/watch?v=qvBYEpMV1FY" target="_blank" class="enlace-youtube">
                ▶ Abrir Melodía de la Naturaleza
            </a>
        </div>
    </div>

    <script>
        const modal = document.getElementById("miModal");
        const btn = document.getElementById("btnAbrir");
        const span = document.getElementById("btnCerrar");
        const contenedorFrase = document.getElementById("frase-paz");

        // --- 3. Lista de frases aleatorias ---
        const frases = [
            "\"La paz viene de adentro. No la busques afuera.\"",
            "\"La naturaleza no se apresura, sin embargo, todo se logra.\"",
            "\"En la tranquilidad hay salud, en la paz hay felicidad.\"",
            "\"Respira. Eres un universo de calma en medio de la tormenta.\"",
            "\"Deja que el silencio de las montañas calme tu mente.\"",
            "\"A veces, la cosa más productiva que puedes hacer es relajarte.\""
        ];

        btn.onclick = function () {
            // Elegir una frase al azar cada vez que se abre
            const fraseAzar = frases[Math.floor(Math.random() * frases.length)];
            contenedorFrase.innerText = fraseAzar;
            
            modal.style.display = "block";
        }

        function cerrarModal() { modal.style.display = "none"; }
        span.onclick = cerrarModal;
        window.onclick = function (event) { if (event.target == modal) { cerrarModal(); } }
    </script>

</body>
</html>
